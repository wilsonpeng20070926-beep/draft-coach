name: Release Artifacts

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Package ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            command: npm run dist:win
            artifact: draft-coach-windows
          - os: macos-latest
            command: npm run dist:mac
            artifact: draft-coach-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Electron runtime
        run: node node_modules/electron/install.js

      - name: Test release build
        run: npm run build

      - name: Enforce release-channel policy gates
        shell: bash
        run: |
          if [[ "$GITHUB_REF_NAME" == *-preview.* ]]; then
            npm run release:policy:preview
          else
            npm run release:policy:assert
          fi

      - name: Package
        run: ${{ matrix.command }}

      - name: Verify artifacts
        run: npm run release:assert-artifacts

      - name: Write checksums
        run: npm run release:checksums

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            release/*.exe
            release/*.zip
            release/*.dmg
            release/SHA256SUMS.txt

  publish:
    name: Attach artifacts to GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release documentation
        uses: actions/checkout@v7

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Make checksum asset names unique
        run: |
          find artifacts -name SHA256SUMS.txt -print0 | while IFS= read -r -d '' file; do
            artifact_dir="$(basename "$(dirname "$file")")"
            mv "$file" "$(dirname "$file")/SHA256SUMS-${artifact_dir}.txt"
          done

      - name: Write release disclosure
        shell: bash
        run: |
          if [[ "$GITHUB_REF_NAME" == *-preview.* ]]; then
            cat > release-notes.md <<'EOF'
          > [!WARNING]
          > This is an uncertified, unsigned friend preview. Riot product registration and the Leaguepedia/Fandom access and redistribution reviews are still pending. Draft Coach is not approved, endorsed, certified, or production-ready.

          Draft Coach is a read-only Windows and macOS companion for League of Legends champ select. It presents multiple explainable recommendations and never selects, hovers, locks, sends chat, or changes gameplay on the user's behalf.

          Professional snapshot fetching and publishing remain disabled. Windows SmartScreen and macOS Gatekeeper may warn because these artifacts are not commercially signed or Apple-notarized.

          Download the installer/archive for your platform and the matching SHA-256 checksum file below.
          EOF
          else
            cat > release-notes.md <<'EOF'
          Draft Coach stable release candidate. The stable release policy gate passed for this tag.
          EOF
          fi

      - name: Publish release assets
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ contains(github.ref_name, '-preview.') && format('Draft Coach {0} Uncertified Friend Preview', github.ref_name) || format('Draft Coach {0}', github.ref_name) }}
          body_path: release-notes.md
          draft: ${{ !contains(github.ref_name, '-preview.') }}
          prerelease: ${{ contains(github.ref_name, '-preview.') }}
          make_latest: ${{ contains(github.ref_name, '-preview.') && 'false' || 'true' }}
          files: artifacts/**/*
