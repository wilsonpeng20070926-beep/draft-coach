name: Release Artifacts

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Package ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            command: npm run dist:win
            artifact: draft-coach-windows
          - os: macos-latest
            command: npm run dist:mac
            artifact: draft-coach-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test release build
        run: npm run build

      - name: Package
        run: ${{ matrix.command }}

      - name: Verify artifacts
        run: npm run release:assert-artifacts

      - name: Write checksums
        run: npm run release:checksums

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            release/*.exe
            release/*.zip
            release/*.dmg
            release/SHA256SUMS.txt

  publish:
    name: Attach artifacts to GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: package
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Make checksum asset names unique
        run: |
          find artifacts -name SHA256SUMS.txt -print0 | while IFS= read -r -d '' file; do
            artifact_dir="$(basename "$(dirname "$file")")"
            mv "$file" "$(dirname "$file")/SHA256SUMS-${artifact_dir}.txt"
          done

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: artifacts/**/*
